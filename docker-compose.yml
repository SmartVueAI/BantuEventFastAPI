services:
  redis:
    image: redis:7-alpine
    container_name: sonmahair_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sonmahair_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000  # Add this line
    networks:
      - nginx-proxy-manager_default
      - app_network
    expose:
      - "8000"
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}  # Use the full URL from .env
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./static:/app/static
    restart: unless-stopped

networks:
  nginx-proxy-manager_default:
    external: true
  app_network:
    driver: bridge

volumes:
  redis_data: